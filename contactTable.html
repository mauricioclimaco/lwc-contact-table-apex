<template>
    <lightning-card title ="Contatos">
         <lightning-datatable
                key-field="id"
                data={data}
                columns={columns}>
        </lightning-datatable>
    </lightning-card>

    <template if:true={error}>
        <p class="slds-text-color_error">Erro ao retornar contatos: {error}</p>
    </template>
</template>
